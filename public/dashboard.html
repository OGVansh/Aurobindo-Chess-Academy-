<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Arena | Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); }
        /* चेसबोर्ड को मोबाइल पर सही से फिट करने के लिए */
        #myBoard { width: 100%; max-width: 480px; margin: 0 auto; }
    </style>
</head>
<body class="text-slate-100 p-3 md:p-6 space-y-6 max-w-7xl mx-auto">

    <header class="flex flex-col md:flex-row justify-between items-center bg-slate-900 border border-slate-800 p-4 md:p-6 rounded-2xl shadow-xl gap-4 md:gap-0">
        <div class="flex items-center space-x-4 w-full md:w-auto justify-center md:justify-start">
            <img id="profilePhoto" src="https://via.placeholder.com/150" class="w-12 h-12 md:w-14 md:h-14 rounded-full border-2 border-yellow-400 object-cover shadow-md">
            <div class="text-left">
                <h1 id="welcomeTitle" class="text-lg md:text-xl font-bold text-slate-100">Welcome User</h1>
                <p class="text-[10px] md:text-xs text-yellow-400 uppercase tracking-widest font-semibold">Academy Ranked Athlete</p>
            </div>
        </div>
        <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3 w-full md:w-auto">
            <a href="/api/reports/download-pdf" class="text-center bg-slate-800 border border-yellow-400/30 text-yellow-400 hover:bg-slate-700 font-semibold px-4 py-2.5 rounded-xl text-xs md:text-sm shadow transition duration-300 w-full sm:w-auto">
                📥 DOWNLOAD PDF
            </a>
            <button onclick="logout()" class="w-full sm:w-auto bg-red-950/40 border border-red-800 text-red-300 hover:bg-red-900/60 font-semibold px-4 py-2.5 rounded-xl text-xs md:text-sm transition">
                Logout
            </button>
        </div>
    </header>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-5">
        <div class="glass-card p-4 md:p-5 rounded-2xl text-center shadow-lg">
            <p class="text-[10px] md:text-xs uppercase tracking-wider text-slate-400 font-medium mb-1">Matches</p>
            <p id="statMatches" class="text-2xl md:text-3xl font-extrabold text-slate-100">0</p>
        </div>
        <div class="glass-card p-4 md:p-5 rounded-2xl text-center shadow-lg">
            <p class="text-[10px] md:text-xs uppercase tracking-wider text-slate-400 font-medium mb-1">Victories</p>
            <p id="statWins" class="text-2xl md:text-3xl font-extrabold text-green-400">0</p>
        </div>
        <div class="glass-card p-4 md:p-5 rounded-2xl text-center shadow-lg">
            <p class="text-[10px] md:text-xs uppercase tracking-wider text-slate-400 font-medium mb-1">Accuracy</p>
            <p id="statAccuracy" class="text-2xl md:text-3xl font-extrabold text-teal-400">0.0%</p>
        </div>
        <div class="glass-card p-4 md:p-5 rounded-2xl text-center shadow-lg">
            <p class="text-[10px] md:text-xs uppercase tracking-wider text-slate-400 font-medium mb-1">Attendance</p>
            <p id="statAttendance" class="text-2xl md:text-3xl font-extrabold text-yellow-400">0.0%</p>
        </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
        
        <div class="lg:col-span-2 flex flex-col items-center bg-slate-900 border border-slate-800 p-4 md:p-6 rounded-2xl shadow-xl w-full">
            <div class="w-full">
                <div id="myBoard" class="shadow-2xl rounded-lg overflow-hidden border border-slate-700"></div>
            </div>
            <div id="statusMessage" class="mt-4 text-xs md:text-sm font-semibold text-yellow-400 text-center">Your move. White turns.</div>
        </div>

        <div class="glass-card p-5 md:p-6 rounded-2xl shadow-xl flex flex-col justify-between space-y-6">
            <div>
                <h3 class="text-base md:text-lg font-bold text-slate-200 border-b border-slate-700 pb-3 mb-4">AI Engine Config</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] md:text-xs uppercase tracking-wider text-slate-400 mb-2">Engine Difficulty</label>
                        <select id="difficulty" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs md:text-sm focus:outline-none focus:border-yellow-400 text-slate-100">
                            <option value="1">Beginner (Depth 1)</option>
                            <option value="5">Intermediate (Depth 5)</option>
                            <option value="12">Master Engine (Depth 12)</option>
                        </select>
                    </div>
                    <div class="bg-slate-950/60 border border-slate-800 p-3 md:p-4 rounded-xl text-[10px] md:text-xs text-slate-400 leading-relaxed">
                        Matches played directly influence your weekly academy leaderboards and dynamic performance index profiles.
                    </div>
                </div>
            </div>

            <button onclick="restartGame()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-bold py-3 rounded-xl shadow-lg hover:shadow-yellow-400/20 transition duration-300 text-xs md:text-sm">
                🔄 RESET & PLAY WHITE
            </button>
        </div>
    </section>

    <script>
        let board = null;
        const game = new Chess();
        const stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');

        async function initDashboard() {
            try {
                const profileRes = await fetch('/api/auth/session');
                const profile = await profileRes.json();
                if(profile && profile.name) {
                    document.getElementById('welcomeTitle').innerText = `Welcome, ${profile.name}`;
                    if(profile.photo) document.getElementById('profilePhoto').src = profile.photo;
                }
                
                const statsRes = await fetch('/api/student/stats');
                const stats = await statsRes.json();
                if(stats) {
                    document.getElementById('statMatches').innerText = stats.matches || 0;
                    document.getElementById('statWins').innerText = stats.wins || 0;
                    document.getElementById('statAccuracy').innerText = `${stats.accuracy || 0}%`;
                    document.getElementById('statAttendance').innerText = `${stats.attendance || 0}%`;
                }
            } catch(e) {
                console.log("Using default visual placeholders because APIs are still configuring.");
            }
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function makeEngineMove() {
            if (game.game_over()) return;
            const depth = document.getElementById('difficulty').value;
            stockfish.postMessage(`position fen ${game.fen()}`);
            stockfish.postMessage(`go depth ${depth}`);
            
            stockfish.onmessage = function(event) {
                if (event.data.startsWith('bestmove')) {
                    const moveParts = event.data.split(' ');
                    const bestMove = moveParts[1];
                    game.move({
                        from: bestMove.substring(0, 2),
                        to: bestMove.substring(2, 4),
                        promotion: 'q'
                    });
                    board.position(game.fen());
                    updateGameStatus();
                }
            };
        }

        function onDrop (source, target) {
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });
            if (move === null) return 'snapback';
            document.getElementById('statusMessage').innerText = "Stockfish AI is thinking...";
            window.setTimeout(makeEngineMove, 300);
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateGameStatus() {
            if (game.in_checkmate()) {
                document.getElementById('statusMessage').innerText = "Checkmate! Game Over.";
                recordMatchResult(game.turn() === 'b' ? 'win' : 'loss');
            } else if (game.in_draw() || game.in_stalemate()) {
                document.getElementById('statusMessage').innerText = "Match drawn or stalemated.";
                recordMatchResult('draw');
            } else {
                document.getElementById('statusMessage').innerText = game.turn() === 'w' ? "Your move." : "AI Opponent thinking...";
            }
        }

        async function recordMatchResult(outcome) {
            const simulatedAccuracy = outcome === 'win' ? (Math.random() * 15 + 80).toFixed(1) : (Math.random() * 25 + 50).toFixed(1);
            try {
                await fetch('/api/student/game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ result: outcome, accuracy: simulatedAccuracy })
                });
            } catch(e) {}
            initDashboard();
        }

        function restartGame() {
            game.reset();
            board.start();
            document.getElementById('statusMessage').innerText = "New match initialized. Good luck.";
        }

        async function logout() {
            try {
                await fetch('/api/auth/logout');
            } catch(e) {}
            window.location.href = '/';
        }

        initDashboard();
        
        // Chessboard Initialization
        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        // स्क्रीन साइज बदलने पर चेसबोर्ड को एडजस्ट करने का कोड
        $(window).resize(board.resize);

    </script>
</body>
  </html>
